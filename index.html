<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiszki – Egzamin I 2025</title>
<style>
  :root {
    --bg: #0f1419;
    --card: #1a2332;
    --text: #e8edf4;
    --muted: #8b9cb3;
    --accent: #4f8cff;
    --green: #3dd68c;
    --blue: #6eb5ff;
    --red: #ff6b6b;
    --border: #2a3548;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.5rem;
  }
  header {
    width: min(720px, 100%);
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  h1 { font-size: 1.4rem; font-weight: 600; }
  .progress { color: var(--muted); font-size: 0.95rem; }
  .controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  button {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: #243044; border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #3d7ae8; }
  .scene {
    width: min(720px, 100%);
    perspective: 1200px;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 620px;
  }
  .card {
    width: 100%;
    min-height: 580px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    overflow-y: auto;
  }
  .face.back { transform: rotateY(180deg); }
  .q-num {
    font-size: 0.8rem;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .question { font-size: 1.1rem; line-height: 1.55; font-weight: 500; }
  .options { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
  .options li {
    padding: 0.65rem 0.9rem;
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    line-height: 1.45;
    font-size: 0.95rem;
  }
  .options li .letter {
    font-weight: 700;
    color: var(--accent);
    margin-right: 0.4rem;
  }
  .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .correct-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .correct-item {
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border-left: 4px solid var(--blue);
    background: rgba(110,181,255,0.08);
    line-height: 1.45;
  }
  .correct-item.pewniak {
    border-left-color: var(--green);
    background: rgba(61,214,140,0.1);
  }
  .correct-item .tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: 0.15rem 0.45rem;
    border-radius: 4px;
    margin-bottom: 0.35rem;
  }
  .tag-blue { background: rgba(110,181,255,0.2); color: var(--blue); }
  .tag-green { background: rgba(61,214,140,0.2); color: var(--green); }
  .warning {
    margin-top: 0.5rem;
    padding: 0.75rem 1rem;
    background: rgba(255,107,107,0.1);
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 8px;
    color: var(--red);
    font-size: 0.9rem;
    line-height: 1.45;
  }
  .warning strong { display: block; margin-bottom: 0.25rem; }
  .note {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    margin-top: auto;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }
  .empty-correct {
    color: var(--muted);
    font-style: italic;
    padding: 1rem;
    text-align: center;
  }
  .hint {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-top: 1rem;
  }
  .nav-bar {
    width: min(720px, 100%);
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 1rem;
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Egzamin I 2025 – Fiszki</h1>
    <div class="progress" id="progress"></div>
  </div>
  <div class="controls">
    <button id="shuffleBtn">Losuj kolejność</button>
    <button id="resetBtn">Od początku</button>
  </div>
</header>

<div class="scene">
  <div class="card" id="card">
    <div class="face front" id="front"></div>
    <div class="face back" id="back"></div>
  </div>
</div>

<div class="nav-bar">
  <button id="prevBtn">← Poprzednia</button>
  <button class="primary" id="flipBtn">Odwróć</button>
  <button id="nextBtn">Następna →</button>
</div>
<p class="hint">Kliknij kartę lub naciśnij spację, aby odwrócić · Strzałki ← → do nawigacji</p>

let order = CARDS.map((_, i) => i);
let current = 0;
let flipped = false;

const cardEl = document.getElementById('card');
const frontEl = document.getElementById('front');
const backEl = document.getElementById('back');
const progressEl = document.getElementById('progress');

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderFront(c) {
  const opts = c.options.map(o =>
    `<li><span class="letter">${o.letter.toUpperCase()})</span>${esc(o.text)}</li>`
  ).join('');
  return `
    <div class="q-num">Pytanie ${c.id}</div>
    <div class="question">${esc(c.question)}</div>
    <ul class="options">${opts}</ul>
    <div class="note">Kliknij, aby zobaczyć poprawne odpowiedzi</div>
  `;
}

function renderBack(c) {
  const pewniaki = new Set(c.pewniaki || []);
  let correctHtml;
  if (!c.correct || c.correct.length === 0) {
    correctHtml = '<div class="empty-correct">Brak poprawnych odpowiedzi (nie zaznaczaj nic)</div>';
  } else {
    correctHtml = '<div class="correct-list">' + c.correct.map(letter => {
      const opt = c.options.find(o => o.letter === letter);
      if (!opt) return '';
      const isPewniak = pewniaki.has(letter);
      const tag = isPewniak
        ? '<span class="tag tag-green">PRAWDOPODOBNIE</span>'
        : '<span class="tag tag-blue">Poprawna</span>';
      return `<div class="correct-item${isPewniak ? ' pewniak' : ''}">${tag}<strong>${letter.toUpperCase()})</strong> ${esc(opt.text)}</div>`;
    }).join('') + '</div>';
  }

  let wrongHtml = '';
  if (c.certain_wrong && c.certain_wrong.length > 0) {
    const items = c.certain_wrong.map(letter => {
      const opt = c.options.find(o => o.letter === letter);
      return opt ? `<strong>${letter.toUpperCase()})</strong> ${esc(opt.text)}` : '';
    }).filter(Boolean).join('<br>');
    wrongHtml = `<div class="warning"><strong>Na pewno zła odpowiedź (wyzerowała zadanie):</strong>${items}</div>`;
  }

  const note = c.notes ? `<div class="note">${esc(c.notes)}</div>` : '';
  return `
    <div class="q-num">Pytanie ${c.id} – odpowiedzi</div>
    <div class="label">Poprawne odpowiedzi</div>
    ${correctHtml}
    ${wrongHtml}
    ${note}
  `;
}

function show() {
  const c = CARDS[order[current]];
  frontEl.innerHTML = renderFront(c);
  backEl.innerHTML = renderBack(c);
  progressEl.textContent = `${current + 1} / ${order.length}`;
  cardEl.classList.toggle('flipped', flipped);
}

function flip() {
  flipped = !flipped;
  cardEl.classList.toggle('flipped', flipped);
}

function go(delta) {
  current = (current + delta + order.length) % order.length;
  flipped = false;
  show();
}

document.getElementById('flipBtn').addEventListener('click', flip);
document.getElementById('prevBtn').addEventListener('click', () => go(-1));
document.getElementById('nextBtn').addEventListener('click', () => go(1));
cardEl.addEventListener('click', flip);

document.getElementById('shuffleBtn').addEventListener('click', () => {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  current = 0; flipped = false; show();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  order = CARDS.map((_, i) => i);
  current = 0; flipped = false; show();
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); flip(); }
  if (e.code === 'ArrowRight') go(1);
  if (e.code === 'ArrowLeft') go(-1);
});

show();
</script>
