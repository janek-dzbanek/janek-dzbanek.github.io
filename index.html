<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Quiz offline – krok po kroku</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 800px; margin: auto; padding: 20px; }
    .question { margin-bottom: 20px; }
    .answers label { display: block; margin: 5px 0; padding: 5px; min-height: 24px; }
    .correct { color: green; font-weight: bold; }
    .wrong { color: red; font-weight: bold; }
    .answer-correct { background-color: #d4edda; border-left: 4px solid #28a745; }
    .answer-wrong { background-color: #f8d7da; border-left: 4px solid #dc3545; }
    .answer-missed { background-color: #fff3cd; border-left: 4px solid #ffc107; }
    .answer-neutral { border-left: 4px solid transparent; }
    .answer-icon { display: inline-block; width: 24px; }
    input[type="checkbox"] { margin-right: 5px; }
    .correct-list { margin-top: 10px; }
    .correct-list div { margin: 3px 0; }
    .comments { font-size: 0.9em; color: #666; margin-top: 10px; }
    button { margin: 10px 5px 0 0; }
    .stats { margin-top: 20px; }
    #time { font-size: 1.2em; font-weight: bold; }
  </style>
</head>
<body>

<h1>Quiz offline</h1>
<input type="file" id="fileInput" accept=".quiz,.txt"><br><br>
<button id="shuffleBtn" style="display:none">🔀 Pomieszaj pytania</button>
<button id="exportBtn" style="display:none">📄 Pobierz cały quiz jako .txt</button>

<div id="stats" class="stats">
  <div>Poprawne: <span id="correctCount">0</span></div>
  <div>Niepoprawne: <span id="incorrectCount">0</span></div>
  <div>Wszystkie: <span id="totalCount">0</span></div>
  <div>Czas: <span id="time">00:00:00</span></div>
</div>

<div id="quizContainer"></div>
<button id="nextBtn" style="display:none">Następne pytanie</button>
<button id="downloadBtn" style="display:none">📥 Pobierz pytania, które zrobiłeś źle</button>

<script>
let questions = [];
let originalQuestions = [];
let currentIndex = 0;
let incorrectQuestions = [];
let userAnswers = [];
let correctAnswers = 0;
let incorrectAnswers = 0;
let totalAnswers = 0;
let startTime = null;
let timerInterval;

document.getElementById('fileInput').addEventListener('change', function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    questions = parseQuestions(e.target.result);
    originalQuestions = structuredClone(questions);
    currentIndex = 0;
    incorrectQuestions = [];
    userAnswers = [];
    correctAnswers = 0;
    incorrectAnswers = 0;
    totalAnswers = 0;
    document.getElementById('shuffleBtn').style.display = 'inline';
    document.getElementById('exportBtn').style.display = 'inline';
    document.getElementById('stats').style.display = 'inline';
    document.getElementById('totalCount').textContent = questions.length;
    showQuestion();
  };
  reader.readAsText(file);
});

document.getElementById('shuffleBtn').addEventListener('click', () => {
  questions = shuffleArray(questions);
  currentIndex = 0;
  incorrectQuestions = [];
  userAnswers = [];
  correctAnswers = 0;
  incorrectAnswers = 0;
  totalAnswers = 0;
  showQuestion();
});

document.getElementById('exportBtn').addEventListener('click', () => {
  downloadQuizFile(originalQuestions, 'caly_quiz.txt');
});

function shuffleArray(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function parseQuestions(text) {
  const lines = text.split(/\r?\n/);
  const questions = [];
  let current = null;

  lines.forEach(line => {
    if (/^\d+\.\s/.test(line)) {
      if (current) questions.push(current);
      current = { text: line.replace(/^\d+\.\s/, ''), answers: [], comments: [] };
    } else if (/^\*[a-z]\.\s/.test(line)) {
      const match = line.substring(1).match(/^([a-z])\.\s(.*)/);
      if (match) {
        current.answers.push({ text: match[2], correct: true });
      }
    } else if (/^[a-z]\.\s/.test(line)) {
      const match = line.match(/^([a-z])\.\s(.*)/);
      if (match) {
        current.answers.push({ text: match[2], correct: false });
      }
    } else if (/^#/.test(line)) {
      current.comments.push(line.substring(1).trim());
    } else if (line.trim()) {
      const last = current?.answers.at(-1);
      if (last) {
        last.text += " " + line.trim();
      } else if (current?.comments.length) {
        current.comments[current.comments.length - 1] += " " + line.trim();
      }
    }
  });

  if (current) questions.push(current);
  return questions;
}

function showQuestion() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  document.getElementById('nextBtn').style.display = 'none';

  if (currentIndex >= questions.length) {
    clearInterval(timerInterval);
    showSummary();
    return;
  }

  const q = structuredClone(questions[currentIndex]);
  q.answers = shuffleArray(q.answers);

  const div = document.createElement('div');
  div.className = 'question';
  div.innerHTML = `<strong>${currentIndex + 1}.</strong> ${q.text}`;

  const answersDiv = document.createElement('div');
  answersDiv.className = 'answers';

  q.answers.forEach((ans, i) => {
    const label = document.createElement('label');
    label.innerHTML = `
      <span class="answer-icon"><input type="checkbox" name="answer" value="${i}"></span>${ans.text}
    `;
    answersDiv.appendChild(label);
  });

  const submitBtn = document.createElement('button');
  submitBtn.textContent = 'Zatwierdź odpowiedź';
  submitBtn.onclick = () => {
    if (!startTime) startTimer();
    if(checkAnswer(q) != "not_selected") {
      submitBtn.disabled = true;
    }
  };

  container.appendChild(div);
  container.appendChild(answersDiv);
  container.appendChild(submitBtn);
}

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsedTime = Date.now() - startTime;
    const hours = String(Math.floor(elapsedTime / 3600000)).padStart(2, '0');
    const minutes = String(Math.floor((elapsedTime % 3600000) / 60000)).padStart(2, '0');
    const seconds = String(Math.floor((elapsedTime % 60000) / 1000)).padStart(2, '0');
    document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
  }, 1000);
}

function checkAnswer(question) {
  const selected = document.querySelectorAll('input[name="answer"]:checked');

  if (selected.length === 0) {
    alert("Zaznacz przynajmniej jedną odpowiedź!");
    return "not_selected";
  }

  let selectedIndices = Array.from(selected).map(s => parseInt(s.value));
  let correctIndices = question.answers.map((a, i) => a.correct ? i : -1).filter(i => i !== -1);

  selectedIndices.sort((a, b) => a - b);
  correctIndices.sort((a, b) => a - b);
  const isCorrect = JSON.stringify(selectedIndices) === JSON.stringify(correctIndices);

  if (isCorrect) correctAnswers++;
  else incorrectAnswers++;

  totalAnswers++;

  userAnswers.push({ question, selectedIndices, correctIndices });

  const container = document.getElementById('quizContainer');

  // Kolorowanie odpowiedzi
  const labels = document.querySelectorAll('.answers label');
  labels.forEach((label, idx) => {
    const wasSelected = selectedIndices.includes(idx);
    const shouldBeSelected = correctIndices.includes(idx);

    const iconSpan = label.querySelector('.answer-icon');
    const textContent = question.answers[idx].text;

    if (wasSelected && shouldBeSelected) {
      // Poprawnie zaznaczona
      label.className = 'answer-correct';
      iconSpan.innerHTML = '✅';
    } else if (wasSelected && !shouldBeSelected) {
      // Błędnie zaznaczona
      label.className = 'answer-wrong';
      iconSpan.innerHTML = '❌';
    } else if (!wasSelected && shouldBeSelected) {
      // Pominięta poprawna odpowiedź
      label.className = 'answer-missed';
      iconSpan.innerHTML = '⚠️';
    } else {
      // Poprawnie niezaznaczona
      label.className = 'answer-neutral';
      iconSpan.innerHTML = '&nbsp;&nbsp;';
    }
  });

  const result = document.createElement('div');

  if (isCorrect) {
    result.innerHTML = `<p class="correct">✅ Odpowiedź w pełni poprawna!</p>`;
  } else {
    result.innerHTML = `<p class="wrong">❌ Odpowiedź niepoprawna. Sprawdź zaznaczone odpowiedzi powyżej.</p>`;
  }

  if (!isCorrect) {
    incorrectQuestions.push(question);
  }

  if (question.comments.length) {
    const comments = document.createElement('div');
    comments.className = 'comments';
    comments.innerHTML = question.comments.map(c => `🛈 ${c}`).join('<br>');
    result.appendChild(comments);
  }

  container.appendChild(result);

  // Zablokowanie odpowiedzi po zatwierdzeniu
  const inputs = document.querySelectorAll('input[name="answer"]');
  inputs.forEach(input => input.disabled = true);

  document.getElementById('nextBtn').style.display = 'inline';

  // Aktualizacja liczników
  document.getElementById('correctCount').textContent = correctAnswers;
  document.getElementById('incorrectCount').textContent = incorrectAnswers;
}

document.getElementById('nextBtn').addEventListener('click', () => {
  currentIndex++;
  showQuestion();
});

function showSummary() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = `<h2>Podsumowanie</h2>`;

  userAnswers.forEach((entry, i) => {
    const q = entry.question;
    const div = document.createElement('div');
    div.className = 'question';

    const selectedIndicesStr = JSON.stringify(entry.selectedIndices.sort((a, b) => a - b));
    const correctIndicesStr = JSON.stringify(entry.correctIndices.sort((a, b) => a - b));
    const wasCorrect = selectedIndicesStr === correctIndicesStr;

    div.innerHTML = `<strong>${i + 1}.</strong> ${q.text}`;

    const answerSection = document.createElement('div');

    // Twoja odpowiedź
    const yourAnswerDiv = document.createElement('div');
    yourAnswerDiv.innerHTML = '<p class="' + (wasCorrect ? 'correct' : 'wrong') + '">Twoja odpowiedź:</p>';
    entry.selectedIndices.forEach(idx => {
      const ansDiv = document.createElement('div');
      ansDiv.textContent = `• ${q.answers[idx].text}`;
      yourAnswerDiv.appendChild(ansDiv);
    });
    answerSection.appendChild(yourAnswerDiv);

    // Poprawna odpowiedź (jeśli źle)
    if (!wasCorrect) {
      const correctAnswerDiv = document.createElement('div');
      correctAnswerDiv.innerHTML = '<p class="correct">Poprawna odpowiedź:</p>';
      entry.correctIndices.forEach(idx => {
        const ansDiv = document.createElement('div');
        ansDiv.textContent = `• ${q.answers[idx].text}`;
        correctAnswerDiv.appendChild(ansDiv);
      });
      answerSection.appendChild(correctAnswerDiv);
    } else {
      const correctMsg = document.createElement('p');
      correctMsg.className = 'correct';
      correctMsg.textContent = 'Poprawnie!';
      answerSection.appendChild(correctMsg);
    }

    div.appendChild(answerSection);
    container.appendChild(div);
  });

  if (incorrectQuestions.length > 0) {
    document.getElementById('downloadBtn').style.display = 'inline';
  }
}

document.getElementById('downloadBtn').addEventListener('click', () => {
  downloadQuizFile(incorrectQuestions, 'bledne_pytania.quiz');
});

function downloadQuizFile(questionList, filename) {
  const lines = [];
  questionList.forEach((q, i) => {
    lines.push(`${i + 1}. ${q.text}`);
    q.answers.forEach((ans, index) => {
      const letter = String.fromCharCode('a'.charCodeAt(0) + index);
      lines.push(`${ans.correct ? '*' : ''}${letter}. ${ans.text}`);
    });
    q.comments.forEach(c => lines.push(`#${c}`));
    lines.push('');
  });

  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
